services:
  init:
    build: .
    command: sh docker/init.sh
    env_file: .env
    volumes:
      - .:/app

  app:
    build: .
    command: php artisan serve --host=0.0.0.0 --port=8000
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      init:
        condition: service_completed_successfully

  scheduler:
    build: .
    command: php artisan schedule:work
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      init:
        condition: service_completed_successfully

  worker:
    build: .
    command: php artisan queue:work --tries=3
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      init:
        condition: service_completed_successfully
